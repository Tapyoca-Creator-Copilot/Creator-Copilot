tags:
  - Earnings
summary: Create an earning
description: >
  Add a new earning to a project. Requires authentication.
security:
  - BearerAuth: []
parameters:
  - name: project_id
    in: path
    type: string
    required: true
    description: UUID of the project
  - name: body
    in: body
    required: true
    schema:
      type: object
      required:
        - name
        - amount
        - sourceType
        - earningDate
      properties:
        name:
          type: string
          example: Spotify royalties Q1
        amount:
          type: number
          example: 1250.50
        sourceType:
          type: string
          example: Streaming
        description:
          type: string
          example: Q1 2026 streaming payout
        earningDate:
          type: string
          format: date
          example: "2026-04-15"
        contractUrl:
          type: string
          example: https://example.com/contract.pdf
responses:
  201:
    description: Earning created successfully
    schema:
      type: object
      properties:
        data:
          $ref: "#/definitions/Earning"
  400:
    description: Validation error or missing fields
  401:
    description: Missing or invalid token
