tags:
  - Earnings
summary: Update an earning
description: >
  Update one or more fields of an existing earning.
  Only the fields provided in the request body will be updated.
security:
  - BearerAuth: []
parameters:
  - name: project_id
    in: path
    type: string
    required: true
    description: UUID of the project
  - name: earning_id
    in: path
    type: string
    required: true
    description: UUID of the earning
  - name: body
    in: body
    required: true
    schema:
      type: object
      properties:
        name:
          type: string
        amount:
          type: number
        sourceType:
          type: string
        description:
          type: string
        earningDate:
          type: string
          format: date
        contractUrl:
          type: string
responses:
  200:
    description: Earning updated successfully
    schema:
      type: object
      properties:
        data:
          $ref: "#/definitions/Earning"
  400:
    description: Validation error
  404:
    description: Earning not found
  401:
    description: Missing or invalid token
