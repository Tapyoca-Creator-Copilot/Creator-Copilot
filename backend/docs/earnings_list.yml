tags:
  - Earnings
summary: List earnings for a project
description: >
  Returns all earnings for the given project, ordered by date descending.
  Optionally filter by source type.
security:
  - BearerAuth: []
parameters:
  - name: project_id
    in: path
    type: string
    required: true
    description: UUID of the project
  - name: sourceType
    in: query
    type: string
    required: false
    description: Filter by source type (e.g. "Streaming")
responses:
  200:
    description: List of earnings
    schema:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/definitions/Earning"
        count:
          type: integer
          example: 5
  401:
    description: Missing or invalid token
