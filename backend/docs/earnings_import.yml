tags:
  - Earnings
summary: Import earnings from CSV
description: |
  Upload a CSV file along with a JSON column mapping to bulk-import earnings
  into a project. Each row's date must fall within the project's start_date
  and end_date or it will be skipped. Per-row validation errors are returned
  in the response without aborting the whole import. Maximum 500 rows per request.
consumes:
  - multipart/form-data
parameters:
  - name: project_id
    in: path
    type: string
    required: true
    description: Project UUID
  - name: file
    in: formData
    type: file
    required: true
    description: CSV file to import
  - name: mapping
    in: formData
    type: string
    required: true
    description: |
      JSON object mapping CSV column headers to earning fields.
      Valid targets: name, amount, sourceType, earningDate, description, contractUrl.
      Example: {"Date": "earningDate", "Source": "name", "Amount": "amount", "Type": "sourceType"}
security:
  - BearerAuth: []
responses:
  200:
    description: Import results
    schema:
      type: object
      properties:
        data:
          type: object
          properties:
            imported:
              type: integer
            skipped:
              type: integer
            errors:
              type: array
              items:
                type: object
                properties:
                  row:
                    type: integer
                  error:
                    type: string
  400:
    description: Bad request (missing file, bad mapping, validation error)
  401:
    description: Missing or invalid Bearer token
